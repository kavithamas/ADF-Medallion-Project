name: ADF Medallion CD Pipeline

on:
  workflow_dispatch:  # This allows you to click the manual "Run" button
  push:
    branches:
      - adf_publish  # This triggers when you click 'Publish' in ADF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Publish Branch
        uses: actions/checkout@v3
        with:
          ref: adf_publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          # Changed to your actual resource group name
          resourceGroupName: kavidatafact 
          # Points to the folder discovered in your repository
          template: ./kavithamas/ARMTemplateForFactory.json
          parameters: ./kavithamas/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
