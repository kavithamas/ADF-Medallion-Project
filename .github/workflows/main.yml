name: ADF Medallion CD Pipeline

on:
  workflow_dispatch:  # This adds the manual "Run" button so you can test it anytime
  push:
    branches:
      - adf_publish  # This triggers automatically when you click 'Publish' in ADF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Publish Branch
        uses: actions/checkout@v3
        with:
          ref: adf_publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: rg-kavi-data
          # Updated paths to include the /kavithamas/ folder found in your repo
          template: ./kavithamas/ARMTemplateForFactory.json
          parameters: ./kavithamas/ARMTemplateParametersForFactory.json
