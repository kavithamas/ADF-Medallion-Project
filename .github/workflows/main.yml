name: ADF Medallion CD Pipeline

on:
  workflow_dispatch:  # This adds the manual "Run" button
  push:
    branches:
      - adf_publish
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Publish Branch
        uses: actions/checkout@v3
        with:
          ref: adf_publish

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}  # Uses the secret you saved

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: rg-kavi-data
          # Modified paths to look in the root directory instead of a subfolder
          template: ./ARMTemplateForFactory.json
          parameters: ./ARMTemplateParametersForFactory.json
